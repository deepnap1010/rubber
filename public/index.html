<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supreme Rubber Industries &middot; Machine Monitor</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%232f6fe4'/%3E%3Ctext x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">SRI</div>
      <div>
        <h1>Supreme Rubber Industries</h1>
        <p class="brand-sub">Machine Monitor &middot; Live plant telemetry</p>
      </div>
    </div>
    <div class="topbar-stats">
      <div class="topstat">
        <span class="topstat-value" id="stat-online">–</span>
        <span class="topstat-label">Online</span>
      </div>
      <div class="topstat">
        <span class="topstat-value" id="stat-total">–</span>
        <span class="topstat-label">Machines</span>
      </div>
      <div class="topstat">
        <span class="topstat-value mono" id="stat-clock">–:–:–</span>
        <span class="topstat-label" id="stat-refresh">connecting…</span>
      </div>
    </div>
  </header>

  <div id="error-banner" class="error-banner" hidden></div>

  <main id="grid" class="grid" aria-live="polite">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Connecting to plant data…</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
